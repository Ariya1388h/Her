<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seti ❤️ - Our Story</title>
    <meta name="description" content="A surprise website for Seti">
    <meta property="og:title" content="Seti ❤️ - Our Story">
    <meta property="og:description" content="A love story in motion">
    <meta name="theme-color" content="#dc143c">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
            scroll-padding-top: 80px;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #000f1f 0%, #001a35 50%, #000f1f 100%);
            background-attachment: fixed;
            color: #e2e8f0;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar {
            width: 12px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(to bottom, #dc143c, #ff6666);
            border-radius: 6px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(to bottom, #c41230, #dc143c);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animate-float {
            animation: float 3s ease-in-out infinite;
        }

        .animate-fade-in {
            animation: fadeIn 0.8s ease-in;
        }

        .animate-slide-in {
            animation: slideIn 0.6s ease-out;
        }

        .gradient-text {
            background: linear-gradient(to right, #dc143c, #ff6666, #dc143c);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .heart-float {
            position: fixed;
            pointer-events: none;
        }

        section {
            scroll-margin-top: 80px;
        }

        .nav-btn {
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            transform: scale(1.05);
        }

        .nav-btn.active {
            background: rgba(220, 20, 60, 0.3);
            color: rgb(255, 102, 102);
        }

        .reason-card {
            cursor: pointer;
            transition: all 0.4s ease;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, rgba(220, 20, 60, 0.1) 0%, rgba(139, 0, 139, 0.1) 100%);
            border: 1px solid rgba(220, 20, 60, 0.3);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .reason-card:hover {
            transform: scale(1.05);
            background: linear-gradient(135deg, rgba(220, 20, 60, 0.2) 0%, rgba(139, 0, 139, 0.2) 100%);
            border-color: rgba(220, 20, 60, 0.6);
        }

        .timeline-dot {
            width: 16px;
            height: 16px;
            background: #dc143c;
            border-radius: 50%;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 0 20px rgba(220, 20, 60, 0.6);
        }

        .timeline-line {
            position: absolute;
            width: 4px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(to bottom, #dc143c, rgba(220, 20, 60, 0.3));
        }

        .progress-bar {
            background: linear-gradient(to right, #dc143c, #ff6666);
            height: 8px;
            border-radius: 4px;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-950 via-blue-950 to-slate-950 text-white">

    <!-- Navigation -->
    <nav id="nav" class="hidden md:flex fixed top-0 left-0 right-0 z-50 bg-slate-950/80 backdrop-blur-lg border-b border-red-600/30">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-center gap-8 w-full">
            <button class="nav-btn active" onclick="scrollToSection('landing', 0)">Home</button>
            <button class="nav-btn" onclick="scrollToSection('story', 1)">Our Story</button>
            <button class="nav-btn" onclick="scrollToSection('reasons', 2)">Why I Love You</button>
        </div>
    </nav>

    <!-- Theme Toggle -->
    <button id="themeToggle" onclick="toggleTheme()" class="fixed top-6 right-6 z-50 px-4 py-2 bg-red-600/30 text-red-300 rounded-full hover:bg-red-600/50 transition">
        🌙
    </button>

    <!-- Floating Hearts -->
    <div id="heartsContainer"></div>

    <!-- Main Content -->
    <main class="pt-16">
        <!-- Landing Section -->
        <section id="landing" class="min-h-screen flex flex-col items-center justify-center px-4 sm:px-6 text-center relative overflow-hidden">
            <div class="absolute inset-0 bg-gradient-to-br from-red-600/10 via-transparent to-purple-600/10"></div>
            <div class="relative z-10 w-full animate-fade-in">
                <h1 class="text-4xl sm:text-5xl md:text-6xl lg:text-8xl font-bold mb-4 sm:mb-6 gradient-text leading-tight animate-slide-in">
                    Seti
                </h1>
                <p class="text-xs sm:text-sm md:text-lg lg:text-2xl mb-6 sm:mb-8 text-gray-200 min-h-14 sm:min-h-16 md:min-h-20 flex items-center justify-center px-2 leading-relaxed">
                    A journey of love, memories, and infinite reasons why you mean everything to me.
                </p>
                <div class="text-3xl sm:text-4xl md:text-5xl mb-8 sm:mb-12 space-y-2 sm:space-y-4">
                    <div>❤️</div>
                    <div class="text-xs sm:text-sm md:text-base text-gray-400">Click to begin our story</div>
                </div>
                <button onclick="scrollToSection('story', 1)" class="px-6 sm:px-8 py-3 sm:py-4 bg-gradient-to-r from-red-600 to-red-500 text-white font-bold rounded-full text-sm sm:text-base md:text-lg hover:shadow-lg hover:shadow-red-600/50 transition hover:scale-105">
                    Start the Journey
                </button>
            </div>
            <div class="absolute bottom-6 sm:bottom-10 left-1/2 -translate-x-1/2 text-xl sm:text-2xl animate-float">
                ⬇️
            </div>
        </section>

        <!-- Our Story Section -->
        <section id="story" class="min-h-screen py-20 px-4 sm:px-6 relative">
            <h2 class="text-3xl sm:text-4xl md:text-5xl font-bold text-center mb-16 gradient-text">Our Story</h2>
            
            <div class="max-w-2xl mx-auto relative">
                <div class="timeline-line" style="height: 100%;"></div>
                
                <div id="timeline" class="space-y-12">
                    <!-- Timeline items will be inserted here -->
                </div>
            </div>
        </section>

        <!-- Reasons Section -->
        <section id="reasons" class="min-h-screen py-20 px-4 sm:px-6">
            <div class="max-w-4xl mx-auto">
                <h2 class="text-3xl sm:text-4xl md:text-5xl font-bold text-center mb-4 gradient-text">Why I Love You</h2>
                
                <div class="mb-8 flex items-center gap-4">
                    <div class="flex-1 h-2 bg-gray-700 rounded-full overflow-hidden">
                        <div id="progressBar" class="progress-bar" style="width: 0%;"></div>
                    </div>
                    <span id="reasonCounter" class="text-sm sm:text-base font-semibold">0/30</span>
                </div>

                <div id="reasonCard" class="reason-card mb-8 cursor-pointer text-lg sm:text-xl md:text-2xl">
                    Click here to reveal a reason
                </div>

                <div class="text-center text-gray-400 text-sm">
                    <p>And infinite more reasons...</p>
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="py-12 px-4 text-center text-gray-500 border-t border-red-600/20">
            <p>Made with ❤️ for Seti</p>
            <p class="text-sm mt-2">© 2024 Our Love Story. All moments cherished forever.</p>
        </footer>
    </main>

    <script>
        // Timeline Data
        const timelineData = [
            {
                date: "November 9, 1403",
                title: "Got Closer",
                emoji: "💕",
                color: "from-red-600/20 to-purple-600/20"
            },
            {
                date: "November 21, 1403",
                title: "First Hug",
                emoji: "🤗",
                color: "from-red-600/20 to-pink-600/20"
            },
            {
                date: "November 6, 1405",
                title: "A Sweet Moment",
                emoji: "💕",
                color: "from-red-600/20 to-purple-600/20"
            }
        ];

        // Reasons Data
        const reasonsData = [
            "Your smile brightens my day",
            "You always know how to make me happy",
            "Your kindness inspires me",
            "You listen to me",
            "You support me",
            "You have the most beautiful eyes",
            "Your hugs are the best",
            "You're thoughtful",
            "You bring out the best of me",
            "You never give up on me",
            "You make ordinary moments feel special",
            "You're intelligent",
            "The way you look at me",
            "You're incredibly hard working",
            "Your laugh makes me happy",
            "Your sense of adventure",
            "Your passion for life",
            "You're honest with me",
            "Your sense of style",
            "You understand me",
            "You're my inspiration",
            "You're so caring",
            "You motivate me",
            "You're my favorite person to talk to",
            "You're my reason to smile",
            "You're my one and only true love",
            "You being you, yourself",
            "Everything about YOU",
            "Your voice",
            "Simply because you're you"
        ];

        let currentReasonIndex = 0;
        let isDark = true;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderTimeline();
            displayReason();
            createFloatingHearts();
            setInterval(createFloatingHearts, 3000);
        });

        // Render Timeline
        function renderTimeline() {
            const timeline = document.getElementById('timeline');
            timeline.innerHTML = timelineData.map((item, index) => `
                <div class="relative pl-12 sm:pl-0 animate-slide-in" style="animation-delay: ${index * 0.1}s">
                    <div class="timeline-dot"></div>
                    <div class="bg-gradient-to-r ${item.color} border border-red-600/30 rounded-lg p-4 sm:p-6 text-left">
                        <div class="text-2xl sm:text-3xl mb-2">${item.emoji}</div>
                        <h3 class="text-lg sm:text-xl font-bold text-red-300 mb-1">${item.title}</h3>
                        <p class="text-sm sm:text-base text-gray-300">${item.date}</p>
                    </div>
                </div>
            `).join('');
        }

        // Display Random Reason
        function displayReason() {
            const card = document.getElementById('reasonCard');
            if (currentReasonIndex < reasonsData.length) {
                card.textContent = reasonsData[currentReasonIndex];
                card.style.animation = 'none';
                setTimeout(() => {
                    card.style.animation = 'slideIn 0.4s ease-out';
                }, 10);
                
                const progress = ((currentReasonIndex + 1) / reasonsData.length) * 100;
                document.getElementById('progressBar').style.width = progress + '%';
                document.getElementById('reasonCounter').textContent = `${currentReasonIndex + 1}/${reasonsData.length}`;
                
                currentReasonIndex++;
            } else {
                card.textContent = "You've reached the end! 💕 And infinite more reasons...";
                card.style.opacity = '0.7';
            }
        }

        // Scroll to Section
        function scrollToSection(id, btnIndex) {
            document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
            updateNavButtons(btnIndex);
        }

        // Update Navigation Buttons
        function updateNavButtons(activeIndex) {
            document.querySelectorAll('.nav-btn').forEach((btn, index) => {
                btn.classList.toggle('active', index === activeIndex);
            });
        }

        // Toggle Theme
        function toggleTheme() {
            isDark = !isDark;
            const theme = document.documentElement;
            if (isDark) {
                theme.style.filter = 'invert(0)';
                document.getElementById('themeToggle').textContent = '🌙';
            } else {
                theme.style.filter = 'invert(1) hue-rotate(180deg)';
                document.getElementById('themeToggle').textContent = '☀️';
            }
        }

        // Create Floating Hearts
        function createFloatingHearts() {
            const container = document.getElementById('heartsContainer');
            if (container.children.length > 20) return;
            
            const heart = document.createElement('div');
            heart.textContent = '❤️';
            heart.className = 'heart-float animate-float';
            heart.style.left = Math.random() * 100 + '%';
            heart.style.top = '-20px';
            heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
            heart.style.opacity = Math.random() * 0.5 + 0.3;
            heart.style.animation = `float ${Math.random() * 3 + 3}s ease-in-out forwards`;
            heart.style.animationDelay = Math.random() * 0.5 + 's';
            
            container.appendChild(heart);
            
            setTimeout(() => heart.remove(), 6000);
        }

        // Reason Card Click
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('reasonCard')?.addEventListener('click', displayReason);
        });

        // Add reason card click listener after page load
        window.addEventListener('load', () => {
            document.getElementById('reasonCard').addEventListener('click', displayReason);
        });
    </script>

</body>
</html>
